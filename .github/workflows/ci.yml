name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22, 24]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Validate manifest
        run: node --input-type=module -e "import { readFileSync } from 'fs'; const m = JSON.parse(readFileSync('./openclaw.plugin.json', 'utf8')); if (!m.id || !m.configSchema) process.exit(1); console.log('Manifest valid:', m.id);"
